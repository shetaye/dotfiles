<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Force TamzenForPowerline matches to the BDF bitmaps; the TTF
       variants from the AUR package render with aliasing artifacts. -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>TamzenForPowerline</string>
    </test>
    <edit name="scalable" mode="assign">
      <bool>false</bool>
    </edit>
  </match>
</fontconfig>
